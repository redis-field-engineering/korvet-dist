services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 minioadmin minioadmin; do
        sleep 1;
      done;
      mc mb myminio/korvet --ignore-existing;
      "

  korvet:
    environment:
      KORVET_STORAGE_REMOTE_PATH: ${REMOTE_STORAGE_PATH:-s3://korvet/cold}
      KORVET_STORAGE_REMOTE_S3_ENDPOINT: http://minio:9000
      KORVET_STORAGE_REMOTE_S3_REGION: us-east-1
      KORVET_STORAGE_REMOTE_S3_PATH_STYLE_ACCESS: "true"
      KORVET_STORAGE_REMOTE_S3_ACCESS_KEY_ID: minioadmin
      KORVET_STORAGE_REMOTE_S3_SECRET_ACCESS_KEY: minioadmin
      # Default tick is 1m; shorten it so archived data shows up in MinIO quickly.
      KORVET_STORAGE_WORKER_TICK_INTERVAL: 5s
    depends_on:
      minio-init:
        condition: service_completed_successfully
