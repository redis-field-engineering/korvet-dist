# Standalone observability sample: Redis + Korvet + Prometheus + Grafana,
# plus a kafka-tools container for generating load to populate the dashboard.
#
# The Prometheus + Grafana services live in monitoring.yml so the same stack
# can be reused (via `include`) by other samples and by your own compose files.
include:
  - ./monitoring.yml

services:
  redis:
    image: redis
    ports:
      - "6379:6379"

  korvet:
    image: redisfield/korvet:0.18.0
    command: server
    pull_policy: always
    ports:
      - "9092:9092"
      - "8080:8080"
    environment:
      - KORVET_REDIS_URI=redis://redis:6379
      - KORVET_BROKER_ADVERTISED_HOST=korvet
      - KORVET_REDIS_METRICS_ENABLED=true
      - KORVET_REDIS_METRICS_HISTOGRAM=true
    depends_on:
      - redis

  # Kafka CLI tools for generating produce/consume load (see the Makefile).
  kafka-tools:
    image: apache/kafka
    command: sleep infinity
    depends_on:
      - korvet
