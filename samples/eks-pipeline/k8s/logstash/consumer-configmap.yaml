# =============================================================================
# Logstash Consumer Pipeline ConfigMap
# =============================================================================
# Reads from Korvet using a consumer group, enriches data, writes to new topic
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-consumer-pipeline
  namespace: korvet
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    http.port: 9601
    path.config: /usr/share/logstash/pipeline
    pipeline.workers: 4
    pipeline.batch.size: 500

  logstash.conf: |
    input {
      kafka {
        bootstrap_servers => "korvet.korvet.svc.cluster.local:9092"
        topics => ["logs"]
        group_id => "logstash-consumer"
        client_id => "logstash-consumer"
        consumer_threads => 1
        codec => json
        decorate_events => "extended"
        auto_offset_reset => "latest"
      }
    }

    filter {
      # Add processing metadata
      mutate {
        add_field => {
          "processed_at" => "%{+yyyy-MM-dd'T'HH:mm:ss.SSSZ}"
          "processor" => "logstash-consumer"
        }
      }

      # Enrich based on status code
      if [status_code] {
        if [status_code] >= 500 {
          mutate { add_field => { "severity" => "critical" } }
        } else if [status_code] >= 400 {
          mutate { add_field => { "severity" => "warning" } }
        } else {
          mutate { add_field => { "severity" => "info" } }
        }
      }

      # Enrich based on response time
      if [response_time_ms] {
        if [response_time_ms] > 1000 {
          mutate { add_field => { "latency_class" => "slow" } }
        } else if [response_time_ms] > 200 {
          mutate { add_field => { "latency_class" => "medium" } }
        } else {
          mutate { add_field => { "latency_class" => "fast" } }
        }
      }

      # Remove Kafka metadata fields
      mutate {
        remove_field => ["@version", "@metadata"]
      }
    }

    output {
      kafka {
        bootstrap_servers => "korvet.korvet.svc.cluster.local:9092"
        topic_id => "logs-processed"
        codec => json
        compression_type => "lz4"
        acks => "1"
        batch_size => 16384
        linger_ms => 5
      }
    }
