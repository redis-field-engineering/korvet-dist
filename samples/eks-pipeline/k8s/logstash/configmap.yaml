# =============================================================================
# Logstash Pipeline ConfigMap
# =============================================================================
# Data generator for POC testing
# Generates synthetic log events and sends to Korvet via Kafka protocol
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: korvet
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    path.config: /usr/share/logstash/pipeline
    pipeline.workers: 4
    pipeline.batch.size: 500

  logstash.conf: |
    input {
      # Generator for POC testing - generates infinite synthetic events
      generator {
        count => 0      # 0 = infinite
        threads => 4    # Adjust for throughput
      }
    }

    filter {
      ruby {
        code => '
          require "securerandom"

          # Randomize log data
          levels = ["DEBUG", "INFO", "WARN", "ERROR"]
          services = ["web-app", "auth-service", "payment-api", "inventory", "notification"]
          hosts = (1..10).map { |i| "server-%02d" % i }
          paths = ["/api/v1/users", "/api/v1/orders", "/api/v1/products", "/health", "/metrics"]
          status_codes = [200, 201, 400, 401, 404, 500]

          event.set("timestamp", Time.now.utc.iso8601(3))
          event.set("level", levels.sample)
          event.set("service", services.sample)
          event.set("host", hosts.sample)
          event.set("request_id", SecureRandom.uuid)
          event.set("path", paths.sample)
          event.set("response_time_ms", rand(10..2000))
          event.set("status_code", status_codes.sample)
          event.set("bytes", rand(100..10000))
          event.set("client_ip", "192.168.#{rand(1..255)}.#{rand(1..255)}")

          # Remove generator metadata
          event.remove("sequence")
          event.remove("message")
        '
      }
    }

    output {
      kafka {
        bootstrap_servers => "korvet.korvet.svc.cluster.local:9092"
        topic_id => "logs"
        codec => json
        compression_type => "lz4"
        acks => "1"
        batch_size => 16384
        linger_ms => 5
      }
    }
