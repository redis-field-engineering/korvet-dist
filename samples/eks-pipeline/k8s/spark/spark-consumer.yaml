# =============================================================================
# Spark Application - Korvet Consumer Group
# =============================================================================
# Reads from Korvet using Kafka consumer group protocol.
# 3 executors share partitions (round-robin delivery).
#
# Install Spark Operator first:
#   helm repo add spark-operator https://kubeflow.github.io/spark-operator
#   helm install spark-operator spark-operator/spark-operator -n spark --create-namespace
# =============================================================================
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: korvet-consumer
  namespace: spark
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: apache/spark:3.5.0-python3
  imagePullPolicy: Always
  # Note: The script is embedded via initContainer since volumeMounts don't work correctly
  mainApplicationFile: local:///opt/spark/scripts/consumer-app.py
  sparkVersion: "3.5.0"

  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 10

  sparkConf:
    # Kafka consumer configuration
    "spark.streaming.kafka.consumer.cache.enabled": "false"
    # UI for monitoring
    "spark.ui.prometheus.enabled": "true"
    # Fix Ivy cache location
    "spark.jars.ivy": "/tmp/.ivy2"

  deps:
    packages:
      - "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0"

  volumes:
    - name: spark-code
      configMap:
        name: spark-consumer-code
    - name: scripts
      emptyDir: {}

  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "1g"
    labels:
      app: korvet-consumer
      role: driver
    env:
      - name: BOOTSTRAP_SERVERS
        value: "korvet.korvet.svc.cluster.local:9092"
      - name: TOPIC
        value: "logs"
      - name: GROUP_ID
        value: "spark-consumer-group"
      - name: CHECKPOINT_LOCATION
        value: "/tmp/spark-checkpoint"
    volumeMounts:
      - name: spark-code
        mountPath: /opt/spark/configmap
      - name: scripts
        mountPath: /opt/spark/scripts
    initContainers:
      - name: copy-script
        image: busybox:1.36
        command: ["sh", "-c", "cp /opt/spark/configmap/consumer-app.py /opt/spark/scripts/"]
        volumeMounts:
          - name: spark-code
            mountPath: /opt/spark/configmap
          - name: scripts
            mountPath: /opt/spark/scripts

  executor:
    cores: 1
    instances: 3
    memory: "1g"
    labels:
      app: korvet-consumer
      role: executor
    volumeMounts:
      - name: spark-code
        mountPath: /opt/spark/configmap
      - name: scripts
        mountPath: /opt/spark/scripts
    initContainers:
      - name: copy-script
        image: busybox:1.36
        command: ["sh", "-c", "cp /opt/spark/configmap/consumer-app.py /opt/spark/scripts/"]
        volumeMounts:
          - name: spark-code
            mountPath: /opt/spark/configmap
          - name: scripts
            mountPath: /opt/spark/scripts
