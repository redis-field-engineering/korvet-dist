# =============================================================================
# Spark ServiceAccount with IRSA
# =============================================================================
# Update the role-arn annotation with output from:
#   terraform output spark_iam_role_arn
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: spark
  annotations:
    # Replace with: terraform output spark_iam_role_arn
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/korvet-poc-spark-s3-access"
