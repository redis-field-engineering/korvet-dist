# =============================================================================
# Korvet ConfigMap
# =============================================================================
# Update KORVET_STORAGE_REMOTE_PATH with output from:
#   terraform output s3_bucket_name
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: korvet-config
  namespace: korvet
data:
  # Broker configuration
  KORVET_BROKER_ADVERTISED_HOST: "korvet.korvet.svc.cluster.local"

  # Redis Enterprise connection (OSS Cluster API)
  KORVET_REDIS_URI: "redis://korvet-db.redis.svc.cluster.local:19750"
  KORVET_REDIS_CLUSTER: "true"

  # Remote (cold) tier: Apache Iceberg table on S3.
  # Replace S3_BUCKET with: terraform output s3_bucket_name
  KORVET_STORAGE_REMOTE_PATH: "s3://S3_BUCKET/korvet"
  # Replace with your AWS region
  KORVET_STORAGE_REMOTE_S3_REGION: "us-west-2"
  # No static S3 credentials are set: with IRSA (EKS IAM Roles for Service
  # Accounts), AWS_ROLE_ARN and AWS_WEB_IDENTITY_TOKEN_FILE are injected into
  # the pod and picked up automatically by the AWS SDK default credential chain.

  # The leader-locked storage worker (default tick 1m) offloads sealed segments
  # and enforces retention; no override needed.
  #
  # Tiering is enabled per topic via Kafka topic config, e.g.:
  #   kafka-configs --alter --entity-type topics --entity-name <topic> \
  #     --add-config remote.storage.enable=true,local.retention.ms=86400000
