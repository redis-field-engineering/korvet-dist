# =============================================================================
# Korvet ServiceAccount with IRSA
# =============================================================================
# Update the role-arn annotation with output from:
#   terraform output korvet_iam_role_arn
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: korvet
  namespace: korvet
  annotations:
    # Replace with: terraform output korvet_iam_role_arn
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/korvet-poc-s3-access"
