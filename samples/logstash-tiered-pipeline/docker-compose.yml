services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 minioadmin minioadmin; do
        sleep 1;
      done;
      mc mb myminio/korvet --ignore-existing;
      "

  korvet:
    image: redisfield/korvet:early-access
    ports:
      - "9092:9092"
      - "8080:8080"
    environment:
      KORVET_REDIS_HOST: host.docker.internal
      KORVET_REDIS_PORT: 12000
      KORVET_REDIS_POOL_SIZE: 64
      KORVET_REDIS_METADATA_POOL_SIZE: 64
      KORVET_REDIS_ARCHIVAL_SOURCE_POOL_SIZE: 64
      KORVET_REDIS_COMMITTED_OFFSET_POOL_SIZE: 64
      KORVET_SERVER_ADVERTISED_HOST: korvet
      KORVET_STORAGE_REMOTE_PATH: s3a://korvet/delta
      KORVET_STORAGE_REMOTE_S3_ENDPOINT: http://minio:9000
      KORVET_STORAGE_REMOTE_S3_REGION: us-east-1
      KORVET_STORAGE_REMOTE_S3_CREDENTIALS_TYPE: static
      KORVET_STORAGE_REMOTE_S3_CREDENTIALS_ACCESS_KEY_ID: minioadmin
      KORVET_STORAGE_REMOTE_S3_CREDENTIALS_SECRET_ACCESS_KEY: minioadmin
      KORVET_STORAGE_REMOTE_ARCHIVER_METADATA_CHUNK_SIZE: 4
      KORVET_STORAGE_REMOTE_ARCHIVER_LAG_MESSAGES_THRESHOLD: 1000
      KORVET_STORAGE_REMOTE_ARCHIVER_LAG_DURATION_THRESHOLD: 5s
    depends_on:
      minio-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"

  kafka-tools:
    image: apache/kafka:latest
    command: sleep infinity
    depends_on:
      - korvet

  logstash-producer:
    image: docker.elastic.co/logstash/logstash:8.11.0
    profiles:
      - pipeline
    volumes:
      - ./.generated/producer/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./.generated/producer:/usr/share/logstash/pipeline:ro
    depends_on:
      - korvet

  logstash-consumer:
    image: docker.elastic.co/logstash/logstash:8.11.0
    profiles:
      - pipeline
    environment:
      LOGSTASH_AUTO_OFFSET_RESET: ${LOGSTASH_AUTO_OFFSET_RESET:-latest}
    volumes:
      - ./.generated/consumer/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./.generated/consumer:/usr/share/logstash/pipeline:ro
    depends_on:
      - korvet
