services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 minioadmin minioadmin; do
        sleep 1;
      done;
      mc mb myminio/korvet --ignore-existing;
      "

  korvet:
    image: redisfield/korvet:early-access
    ports:
      - "9092:9092"
      - "8080:8080"
    environment:
      KORVET_REDIS_HOST: host.docker.internal
      KORVET_REDIS_PORT: 12000
      KORVET_SERVER_ADVERTISED_HOST: korvet
      KORVET_SERVER_AUTO_CREATE_TOPICS: "false"
      KORVET_STORAGE_REMOTE_PATH: s3a://korvet/delta
      KORVET_STORAGE_REMOTE_S3_ENDPOINT: http://minio:9000
      KORVET_STORAGE_REMOTE_S3_REGION: us-east-1
      KORVET_STORAGE_REMOTE_S3_CREDENTIALS_TYPE: static
      KORVET_STORAGE_REMOTE_S3_CREDENTIALS_ACCESS_KEY_ID: minioadmin
      KORVET_STORAGE_REMOTE_S3_CREDENTIALS_SECRET_ACCESS_KEY: minioadmin
      KORVET_STORAGE_REMOTE_ARCHIVER_INTERVAL: 15s
      KORVET_STORAGE_REMOTE_ARCHIVER_BATCH_SIZE: 1000
    depends_on:
      minio-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"

  kafka-tools:
    image: apache/kafka:latest
    command: sleep infinity
    depends_on:
      - korvet

  logstash-producer:
    image: docker.elastic.co/logstash/logstash:8.11.0
    profiles:
      - pipeline
    volumes:
      - ./producer/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - korvet

  logstash-consumer:
    image: docker.elastic.co/logstash/logstash:8.11.0
    profiles:
      - pipeline
    volumes:
      - ./consumer/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - korvet
