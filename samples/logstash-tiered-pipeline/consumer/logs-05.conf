input { kafka { bootstrap_servers => "korvet:9092" topics => ["logs-05"] group_id => "logstash-consumer-logs-05" client_id => "logstash-consumer-logs-05" consumer_threads => 1 codec => json decorate_events => "extended" auto_offset_reset => "earliest" } }
filter { ruby { code => 'event.set("processed_at", Time.now.utc.iso8601(3))' } mutate { add_field => { "processor" => "logstash-consumer" } } if [status_code] { if [status_code] >= 500 { mutate { add_field => { "severity" => "critical" } } } else if [status_code] >= 400 { mutate { add_field => { "severity" => "warning" } } } else { mutate { add_field => { "severity" => "info" } } } } if [response_time_ms] { if [response_time_ms] > 1000 { mutate { add_field => { "latency_class" => "slow" } } } else if [response_time_ms] > 200 { mutate { add_field => { "latency_class" => "medium" } } } else { mutate { add_field => { "latency_class" => "fast" } } } } mutate { remove_field => ["@version", "@metadata"] } }
output { kafka { bootstrap_servers => "korvet:9092" topic_id => "logs-processed" codec => json compression_type => "lz4" } }
