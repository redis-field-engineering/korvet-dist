input { java_generator { count => 0 eps => 1000 } }
filter { ruby { code => '
require "securerandom"
levels=["DEBUG","INFO","WARN","ERROR"]; services=["web-app","auth-service","payment-api","inventory","notification"]; hosts=(1..10).map { |i| "server-%02d" % i }; paths=["/api/v1/users","/api/v1/orders","/api/v1/products","/health","/metrics"]; status_codes=[200,201,400,401,404,500]; target_topic="logs-07"
event.set("timestamp", Time.now.utc.iso8601(3)); event.set("level", levels.sample); event.set("service", services.sample); event.set("host", hosts.sample); event.set("request_id", SecureRandom.uuid); event.set("path", paths.sample); event.set("response_time_ms", rand(10..2000)); event.set("status_code", status_codes.sample); event.set("bytes", rand(100..10000)); event.set("client_ip", "192.168.#{rand(1..255)}.#{rand(1..255)}"); event.set("topic", target_topic); event.set("[@metadata][target_topic]", target_topic); event.remove("sequence"); event.remove("message")
' } }
output { kafka { bootstrap_servers => "korvet:9092" topic_id => "%{[@metadata][target_topic]}" codec => json compression_type => "lz4" } }
