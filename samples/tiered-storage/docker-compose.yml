services:
  korvet:
    image: redisfield/korvet:early-access
    pull_policy: always
    ports:
      - "9092:9092"
      - "8080:8080"
    environment:
      # Hot tier: Redis Enterprise Flex on host
      - KORVET_REDIS_URI=redis://host.docker.internal:12000
      # Cold tier: MinIO (S3-compatible)
      - KORVET_STORAGE_REMOTE_PATH=s3a://korvet/delta
      - KORVET_STORAGE_REMOTE_S3_ENDPOINT=http://minio:9000
      - KORVET_STORAGE_REMOTE_S3_REGION=us-east-1
      - KORVET_STORAGE_REMOTE_S3_CREDENTIALS_TYPE=static
      - KORVET_STORAGE_REMOTE_S3_CREDENTIALS_ACCESS_KEY_ID=minioadmin
      - KORVET_STORAGE_REMOTE_S3_CREDENTIALS_SECRET_ACCESS_KEY=minioadmin
      # Archiver settings (run frequently for demo)
      - KORVET_ARCHIVER_INTERVAL=5s
      - KORVET_ARCHIVER_BATCH_SIZE=100
      # Server settings
      - KORVET_BROKER_ADVERTISED_HOST=korvet
      - KORVET_TOPICS_AUTO_CREATE=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/korvet --ignore-existing;
      echo 'Bucket korvet created';
      "

  kafka-tools:
    image: apache/kafka
    command: sleep infinity
    depends_on:
      - korvet

volumes:
  minio-data:
