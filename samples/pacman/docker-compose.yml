services:
  # Redis - Backend storage for Korvet
  redis:
    image: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  # Korvet Server - Kafka-compatible streaming service
  korvet:
    image: redisfield/korvet:early-access
    pull_policy: always
    ports:
      - "9092:9092"
    environment:
      KORVET_REDIS_URI: redis://redis:6379
      KORVET_BROKER_ADVERTISED_HOST: ${KORVET_BROKER_ADVERTISED_HOST:-korvet}
      KORVET_TOPICS_AUTO_CREATE: "true"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 10s
      retries: 12

  # Web Server - Serves the Pac-Man game UI and handles API requests
  web:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run server"
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-korvet:9092}
    depends_on:
      korvet:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health | grep '\"korvet\":\"connected\"' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Consumer - Processes game events from Kafka
  consumer:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run consumer"
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-korvet:9092}
    depends_on:
      korvet:
        condition: service_healthy
      web:
        condition: service_healthy

  # Kafka UI - Browser-based topic explorer for Korvet
  kafka-ui:
    image: kafbat/kafka-ui:latest
    ports:
      - "8081:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: korvet
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BROKER:-korvet:9092}
    depends_on:
      korvet:
        condition: service_healthy

  # RedisInsight - Browser UI for inspecting Korvet's backing Redis streams
  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
