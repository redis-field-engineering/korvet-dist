services:
  # Redis - Backend storage for Korvet
  redis:
    image: redis
    ports:
      - "6379:6379"

  # Korvet Server - Kafka-compatible streaming service
  korvet:
    image: redisfield/korvet:0.18.0
    command: server
    pull_policy: always
    ports:
      - "9092:9092"
    environment:
      KORVET_REDIS_URI: redis://redis:6379
      KORVET_BROKER_ADVERTISED_HOST: korvet
      # Catch-all topic defaults so the producer can create demo-topic on first use
      KORVET_TOPICS_0_NAME: "*"
      KORVET_TOPICS_0_AUTO_CREATE: "true"
    depends_on:
      - redis

  # Kafka CLI Tools - For running kafka-console-producer and kafka-console-consumer
  kafka-tools:
    image: apache/kafka
    command: sleep infinity
    depends_on:
      - korvet
